<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>CampusQuest — Daily Task Command Center</title>
<meta name="description" content="A gamified daily task command center for college operations." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   CampusQuest — design tokens
   ============================================================ */
:root{
  --bg:#0B0A1F;
  --bg-2:#0E0C2A;
  --panel:rgba(23,20,56,0.55);
  --panel-solid:#171438;
  --stroke:rgba(140,120,255,0.18);
  --stroke-bright:rgba(140,120,255,0.45);
  --text:#EDEBFF;
  --muted:#9C97C9;
  --faint:#6E6AA0;

  --violet:#A855F7;
  --violet-2:#7C3AED;
  --cyan:#22D3EE;
  --magenta:#FF2D95;
  --lime:#A3E635;
  --amber:#FBBF24;
  --danger:#FB3B5C;

  --r-lg:20px;
  --r-md:14px;
  --r-sm:10px;
  --shadow:0 20px 50px -20px rgba(0,0,0,0.7);
  --glow-violet:0 0 0 1px rgba(168,85,247,0.4), 0 0 28px -4px rgba(168,85,247,0.55);
  --display:'Orbitron',sans-serif;
  --body:'Space Grotesk',sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::selection{background:rgba(168,85,247,0.4)}

/* ============================================================
   Animated background layers
   ============================================================ */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;filter:blur(60px);opacity:0.6}
.aurora span{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 22s ease-in-out infinite}
.aurora .b1{width:42vw;height:42vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#7C3AED,transparent 70%)}
.aurora .b2{width:36vw;height:36vw;right:-6vw;top:8vh;background:radial-gradient(circle,#FF2D95,transparent 70%);animation-delay:-7s}
.aurora .b3{width:40vw;height:40vw;left:24vw;bottom:-16vw;background:radial-gradient(circle,#22D3EE,transparent 70%);animation-delay:-13s}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(6vw,4vh) scale(1.12)}
  66%{transform:translate(-5vw,-3vh) scale(0.94)}
}
.grid-floor{
  position:fixed;left:0;right:0;bottom:0;height:46vh;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(168,85,247,0.18) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.14) 1px,transparent 1px);
  background-size:54px 54px;
  transform:perspective(420px) rotateX(70deg);
  transform-origin:bottom center;
  -webkit-mask-image:linear-gradient(to top,#000 0%,transparent 92%);
  mask-image:linear-gradient(to top,#000 0%,transparent 92%);
  animation:floor 14s linear infinite;
  opacity:0.55;
}
@keyframes floor{from{background-position-y:0,0}to{background-position-y:54px,54px}}

/* ============================================================
   App shell
   ============================================================ */
.app{position:relative;z-index:2;display:grid;grid-template-columns:248px 1fr;min-height:100vh}

.sidebar{
  position:sticky;top:0;height:100vh;padding:22px 16px;
  display:flex;flex-direction:column;gap:6px;
  background:linear-gradient(180deg,rgba(14,12,42,0.92),rgba(11,10,31,0.78));
  border-right:1px solid var(--stroke);
  backdrop-filter:blur(14px);
}
.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
.brand .mark{
  width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;
  background:conic-gradient(from 140deg,#7C3AED,#FF2D95,#22D3EE,#7C3AED);
  box-shadow:0 0 22px -2px rgba(168,85,247,0.7);
  animation:spinmark 8s linear infinite;
}
.brand .mark span{
  font-family:var(--display);font-weight:900;font-size:20px;color:#fff;
  width:34px;height:34px;border-radius:9px;background:var(--bg-2);display:grid;place-items:center;
}
@keyframes spinmark{to{filter:hue-rotate(360deg)}}
.brand h1{font-family:var(--display);font-size:17px;font-weight:800;letter-spacing:0.5px;margin:0;line-height:1}
.brand p{margin:3px 0 0;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}

.nav-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin:14px 10px 4px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-md);
  color:var(--muted);font-weight:500;font-size:14.5px;position:relative;transition:.2s;
}
.nav-item .ico{font-size:17px;width:22px;text-align:center}
.nav-item:hover{background:rgba(168,85,247,0.1);color:var(--text)}
.nav-item.active{
  color:#fff;background:linear-gradient(90deg,rgba(168,85,247,0.26),rgba(255,45,149,0.1));
  box-shadow:inset 0 0 0 1px var(--stroke-bright);
}
.nav-item.active::before{
  content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);
  width:4px;height:26px;border-radius:0 4px 4px 0;background:linear-gradient(var(--violet),var(--magenta));
  box-shadow:0 0 14px var(--violet);
}
.nav-item .badge{margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,45,149,0.18);color:#ffb3d6}

.sidebar-foot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid var(--stroke);font-size:11px;color:var(--faint);line-height:1.6}
.sidebar-foot b{color:var(--muted);font-weight:600}
.reset-btn{margin-top:12px;width:100%;padding:9px;border-radius:var(--r-sm);font-size:12px;font-weight:600;color:var(--muted);background:rgba(255,255,255,0.04);border:1px solid var(--stroke);transition:.16s}
.reset-btn:hover{color:var(--text);border-color:var(--stroke-bright);background:rgba(168,85,247,0.12)}

/* main column */
.main{min-width:0;display:flex;flex-direction:column}

/* topbar */
.topbar{
  position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:16px;
  padding:16px 28px;background:linear-gradient(180deg,rgba(11,10,31,0.86),rgba(11,10,31,0.3));
  backdrop-filter:blur(10px);border-bottom:1px solid var(--stroke);
}
.search{position:relative;flex:1;max-width:420px}
.search input{
  width:100%;padding:12px 14px 12px 42px;border-radius:var(--r-md);
  background:rgba(20,18,52,0.7);border:1px solid var(--stroke);color:var(--text);font-size:14px;transition:.2s;
}
.search input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(168,85,247,0.18)}
.search .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint)}
.spacer{flex:1}

.player{
  display:flex;align-items:center;gap:14px;padding:8px 8px 8px 16px;border-radius:50px;
  background:rgba(20,18,52,0.7);border:1px solid var(--stroke);
}
.player .meta{text-align:right;line-height:1.15}
.player .meta .name{font-weight:700;font-size:13.5px}
.player .meta .lv{font-size:11px;color:var(--lime);font-family:var(--display);font-weight:600;letter-spacing:.5px}
.player .ring{position:relative;width:46px;height:46px;flex:none}
.player .ring svg{transform:rotate(-90deg);display:block}
.player .ring .lvtxt{
  position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);
  font-weight:800;font-size:15px;color:#fff;text-shadow:0 0 10px var(--violet);
}

.btn{
  display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:var(--r-md);
  font-weight:600;font-size:14px;transition:.18s;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(120deg,var(--violet-2),var(--magenta));color:#fff;
  box-shadow:0 8px 24px -8px rgba(255,45,149,0.6);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px rgba(255,45,149,0.7)}
.btn-ghost{background:rgba(20,18,52,0.7);border:1px solid var(--stroke);color:var(--text)}
.btn-ghost:hover{border-color:var(--stroke-bright);background:rgba(168,85,247,0.12)}

/* view container */
.view{padding:28px;max-width:1280px;width:100%;margin:0 auto;animation:fadeup .45s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.page-head{margin-bottom:22px}
.eyebrow{font-family:var(--display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin:0 0 8px}
.page-head h2{font-family:var(--display);font-size:30px;font-weight:800;margin:0;letter-spacing:.5px}
.page-head p{margin:8px 0 0;color:var(--muted);font-size:15px;max-width:60ch}

/* ============================================================
   Dashboard
   ============================================================ */
.hero{
  position:relative;overflow:hidden;border-radius:var(--r-lg);padding:28px;margin-bottom:24px;
  background:linear-gradient(120deg,rgba(124,58,237,0.28),rgba(255,45,149,0.14) 60%,rgba(34,211,238,0.16));
  border:1px solid var(--stroke-bright);box-shadow:var(--shadow);
  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 80% -20%,rgba(34,211,238,0.25),transparent);pointer-events:none}
.hero .greet{font-family:var(--display);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#ffd9ec;margin:0 0 6px}
.hero h3{font-family:var(--display);font-size:26px;margin:0 0 10px;font-weight:800}
.hero p{margin:0;color:#d9d4ff;font-size:14.5px;max-width:46ch}
.hero .core{position:relative;width:160px;height:160px;flex:none}
.hero .core svg{transform:rotate(-90deg)}
.hero .core .core-mid{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.hero .core .core-mid .pct{font-family:var(--display);font-size:34px;font-weight:900;line-height:1;text-shadow:0 0 18px var(--cyan)}
.hero .core .core-mid .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.hero .core::before{content:"";position:absolute;inset:-10px;border-radius:50%;border:1px dashed rgba(168,85,247,0.4);animation:spin 18s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{
  position:relative;overflow:hidden;padding:20px;border-radius:var(--r-lg);
  background:var(--panel);border:1px solid var(--stroke);backdrop-filter:blur(8px);transition:.2s;
}
.stat:hover{transform:translateY(-4px);border-color:var(--stroke-bright)}
.stat .ico{font-size:22px;width:44px;height:44px;display:grid;place-items:center;border-radius:12px;margin-bottom:14px}
.stat .num{font-family:var(--display);font-size:30px;font-weight:800;line-height:1}
.stat .lab{margin-top:6px;font-size:12.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.stat .bar{position:absolute;left:0;bottom:0;height:3px;width:100%;opacity:.85}
.stat.s-total .ico{background:rgba(168,85,247,0.16);color:var(--violet)} .stat.s-total .bar{background:var(--violet)}
.stat.s-active .ico{background:rgba(34,211,238,0.16);color:var(--cyan)} .stat.s-active .bar{background:var(--cyan)}
.stat.s-done .ico{background:rgba(163,230,53,0.16);color:var(--lime)} .stat.s-done .bar{background:var(--lime)}
.stat.s-over .ico{background:rgba(251,59,92,0.16);color:var(--danger)} .stat.s-over .bar{background:var(--danger)}

.dash-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:20px}
.card{
  border-radius:var(--r-lg);background:var(--panel);border:1px solid var(--stroke);
  backdrop-filter:blur(8px);padding:22px;
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-head h4{font-family:var(--display);font-size:15px;font-weight:700;margin:0;letter-spacing:.5px}
.card-head .link{font-size:12.5px;color:var(--cyan);cursor:pointer}
.card-head .link:hover{text-decoration:underline}

/* category breakdown bars */
.cat-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cat-row .nm{display:flex;align-items:center;gap:8px;width:140px;font-size:13.5px}
.cat-row .track{flex:1;height:10px;border-radius:20px;background:rgba(255,255,255,0.06);overflow:hidden}
.cat-row .fill{height:100%;border-radius:20px;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.cat-row .ct{width:30px;text-align:right;font-family:var(--display);font-size:13px;color:var(--muted)}

/* mini quest list (today) */
.mini{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-md);transition:.18s}
.mini+.mini{margin-top:6px}
.mini:hover{background:rgba(168,85,247,0.08)}
.mini .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 10px currentColor}
.mini .tt{flex:1;min-width:0}
.mini .tt .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini .tt .s{font-size:12px;color:var(--muted);margin-top:2px}
.mini .xp{font-family:var(--display);font-size:12px;color:var(--lime);font-weight:600}

/* ============================================================
   Quests view
   ============================================================ */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;align-items:center}
.chip{
  padding:9px 15px;border-radius:50px;font-size:13px;font-weight:600;
  background:rgba(20,18,52,0.7);border:1px solid var(--stroke);color:var(--muted);transition:.18s;
}
.chip:hover{color:var(--text);border-color:var(--stroke-bright)}
.chip.on{background:linear-gradient(120deg,var(--violet-2),var(--magenta));color:#fff;border-color:transparent;box-shadow:0 6px 18px -8px rgba(255,45,149,0.6)}
.select{
  padding:10px 14px;border-radius:var(--r-md);background:rgba(20,18,52,0.7);
  border:1px solid var(--stroke);color:var(--text);font-size:13.5px;cursor:pointer;
}
.select:focus{outline:none;border-color:var(--violet)}

.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
.quest{
  position:relative;overflow:hidden;border-radius:var(--r-lg);padding:20px;
  background:var(--panel);border:1px solid var(--stroke);backdrop-filter:blur(8px);
  transition:.22s;display:flex;flex-direction:column;gap:12px;
}
.quest::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--violet))}
.quest:hover{transform:translateY(-5px);border-color:var(--stroke-bright);box-shadow:var(--shadow)}
.quest.done{opacity:.62}
.quest.done .q-title{text-decoration:line-through;text-decoration-color:var(--faint)}
.q-top{display:flex;align-items:center;gap:8px}
.q-cat{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:30px;background:rgba(255,255,255,0.06)}
.q-prio{margin-left:auto;font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 9px;border-radius:6px;text-transform:uppercase}
.prio-Critical{background:rgba(251,59,92,0.18);color:#ff8fa3}
.prio-High{background:rgba(255,45,149,0.18);color:#ffb3d6}
.prio-Medium{background:rgba(34,211,238,0.16);color:#8ce9f7}
.prio-Low{background:rgba(163,230,53,0.16);color:#cdf08a}
.q-title{font-weight:700;font-size:16.5px;line-height:1.25;margin:0}
.q-desc{font-size:13.5px;color:var(--muted);line-height:1.55;margin:0;flex:1}
.q-foot{display:flex;align-items:center;gap:10px;margin-top:2px}
.q-assignee{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
.avatar{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;font-family:var(--display);flex:none}
.q-due{margin-left:auto;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;color:var(--muted)}
.q-due.overdue{color:var(--danger)}
.q-due.today{color:var(--amber)}
.q-actions{display:flex;gap:8px;margin-top:4px}
.q-btn{flex:1;padding:9px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;border:1px solid var(--stroke);background:rgba(255,255,255,0.04);transition:.16s;display:flex;align-items:center;justify-content:center;gap:6px}
.q-btn:hover{border-color:var(--stroke-bright);background:rgba(168,85,247,0.12)}
.q-btn.complete{background:linear-gradient(120deg,rgba(163,230,53,0.22),rgba(34,211,238,0.18));color:#dffba0;border-color:rgba(163,230,53,0.4)}
.q-btn.complete:hover{box-shadow:0 0 18px -4px rgba(163,230,53,0.5)}
.q-btn.del{flex:none;width:42px;color:#ff8fa3}
.q-xp{position:absolute;top:16px;right:16px;font-family:var(--display);font-size:11px;font-weight:700;color:var(--lime);opacity:.7}

/* ============================================================
   Board (kanban)
   ============================================================ */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.col{border-radius:var(--r-lg);background:var(--panel);border:1px solid var(--stroke);backdrop-filter:blur(8px);padding:16px;min-height:200px}
.col-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:0 4px}
.col-head .cdot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 10px currentColor}
.col-head h4{font-family:var(--display);font-size:14px;margin:0;font-weight:700;letter-spacing:.5px}
.col-head .cnt{margin-left:auto;font-family:var(--display);font-size:12px;color:var(--muted);background:rgba(255,255,255,0.06);padding:2px 9px;border-radius:20px}
.bcard{border-radius:var(--r-md);padding:14px;background:rgba(20,18,52,0.6);border:1px solid var(--stroke);margin-bottom:10px;position:relative;overflow:hidden;transition:.18s}
.bcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--violet))}
.bcard:hover{border-color:var(--stroke-bright);transform:translateX(2px)}
.bcard .bt{font-weight:600;font-size:14px;margin:0 0 8px;line-height:1.3}
.bcard .bm{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted)}
.bcard .bmove{display:flex;gap:6px;margin-top:11px}
.bmv{flex:1;padding:6px;border-radius:8px;font-size:11.5px;font-weight:600;border:1px solid var(--stroke);background:rgba(255,255,255,0.04);transition:.16s}
.bmv:hover{border-color:var(--stroke-bright);background:rgba(168,85,247,0.14)}
.bmv.fwd{color:#cdf08a;border-color:rgba(163,230,53,0.35)}

/* ============================================================
   Leaderboard
   ============================================================ */
.lb{border-radius:var(--r-lg);background:var(--panel);border:1px solid var(--stroke);backdrop-filter:blur(8px);overflow:hidden}
.lb-row{display:flex;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid var(--stroke);transition:.16s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(168,85,247,0.07)}
.lb-rank{font-family:var(--display);font-size:20px;font-weight:800;width:42px;color:var(--faint)}
.lb-row.top1 .lb-rank{color:#FFD54A;text-shadow:0 0 14px #FFD54A}
.lb-row.top2 .lb-rank{color:#D7DCE6}
.lb-row.top3 .lb-rank{color:#E0A06A}
.lb-av{width:46px;height:46px;border-radius:14px;font-size:16px}
.lb-info{flex:1;min-width:0}
.lb-info .nm{font-weight:700;font-size:15px}
.lb-info .rl{font-size:12.5px;color:var(--muted);margin-top:2px}
.lb-stat{text-align:center;width:74px}
.lb-stat .v{font-family:var(--display);font-size:18px;font-weight:800}
.lb-stat .l{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-top:2px}
.lb-stat.xp .v{color:var(--lime)}

/* empty state */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty .em{font-size:54px;margin-bottom:14px;filter:drop-shadow(0 0 20px rgba(168,85,247,.6))}
.empty h4{font-family:var(--display);font-size:18px;margin:0 0 8px;color:var(--text)}

/* ============================================================
   Modal
   ============================================================ */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(6,5,18,0.72);backdrop-filter:blur(6px);display:grid;place-items:center;padding:20px;animation:fadeup .25s ease}
.modal{
  width:100%;max-width:540px;border-radius:var(--r-lg);background:var(--panel-solid);
  border:1px solid var(--stroke-bright);box-shadow:var(--shadow),var(--glow-violet);
  padding:26px;max-height:90vh;overflow:auto;
}
.modal h3{font-family:var(--display);font-size:20px;margin:0 0 4px;font-weight:800}
.modal .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:600}
.field input,.field textarea,.field select{
  width:100%;padding:12px 14px;border-radius:var(--r-md);background:rgba(11,10,31,0.7);
  border:1px solid var(--stroke);color:var(--text);font-size:14px;transition:.18s;
}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(168,85,247,0.18)}
.field textarea{resize:vertical;min-height:78px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-foot{display:flex;gap:12px;margin-top:8px}
.modal-foot .btn{flex:1;justify-content:center}

/* ============================================================
   Toast + confetti
   ============================================================ */
#toasts{position:fixed;right:22px;bottom:22px;z-index:60;display:flex;flex-direction:column;gap:10px}
.toast{
  display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--r-md);
  background:var(--panel-solid);border:1px solid var(--stroke-bright);box-shadow:var(--shadow);
  font-size:14px;font-weight:600;min-width:240px;animation:toastin .3s ease;
}
.toast .ti{font-size:20px}
.toast .xpb{margin-left:auto;font-family:var(--display);color:var(--lime);font-size:13px}
@keyframes toastin{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
#confetti{position:fixed;inset:0;z-index:70;pointer-events:none}

/* mobile menu button (hidden on desktop) */
.menu-btn{display:none}

/* ============================================================
   Responsive
   ============================================================ */
@media(max-width:1080px){
  .dash-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .hero{grid-template-columns:1fr;text-align:center}
  .hero .core{margin:0 auto}
  .board{grid-template-columns:1fr;}
}
@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;width:248px;z-index:40;transform:translateX(-110%);
    transition:transform .28s ease;height:100vh;
  }
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .menu-btn{display:grid;place-items:center;width:44px;height:44px;border-radius:var(--r-md);background:rgba(20,18,52,0.7);border:1px solid var(--stroke);font-size:20px}
  .scrim{position:fixed;inset:0;z-index:35;background:rgba(6,5,18,.6);backdrop-filter:blur(3px);display:none}
  .scrim.show{display:block}
  .player .meta{display:none}
  .topbar{padding:14px 16px}
  .view{padding:18px 16px}
  .search{max-width:none}
}
@media(max-width:520px){
  .stat-grid{grid-template-columns:1fr 1fr;gap:12px}
  .page-head h2{font-size:24px}
  .row2{grid-template-columns:1fr}
  .search{flex:0 0 auto;width:46px}
  .search input{padding-right:8px;color:transparent}
  .search input:focus{position:absolute;right:0;width:62vw;color:var(--text);z-index:6}
}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  #particles,.grid-floor{display:none}
}
</style>
</head>
<body>

<!-- animated background -->
<canvas id="particles"></canvas>
<div class="aurora"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
<div class="grid-floor"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark"><span>C</span></div>
      <div>
        <h1>CampusQuest</h1>
        <p>Command Center</p>
      </div>
    </div>

    <div class="nav-label">Operations</div>
    <a class="nav-item" data-view="dashboard"><span class="ico">⚡</span> Dashboard</a>
    <a class="nav-item" data-view="quests"><span class="ico">🎯</span> Quests <span class="badge" id="nav-active">0</span></a>
    <a class="nav-item" data-view="board"><span class="ico">🗂️</span> Board</a>
    <a class="nav-item" data-view="leaderboard"><span class="ico">🏆</span> Leaderboard</a>

    <div class="nav-label">Today</div>
    <a class="nav-item" data-view="quests" data-filter="today"><span class="ico">📅</span> Due Today <span class="badge" id="nav-today">0</span></a>
    <a class="nav-item" data-view="quests" data-filter="overdue"><span class="ico">🔥</span> Overdue</a>

    <div class="sidebar-foot">
      <b>Riverstone College</b><br>
      Daily ops, gamified.<br>
      <span id="clock"></span>
      <button class="reset-btn" id="resetBtn" title="Restore the 20 sample quests">↺ Reset sample data</button>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="search">
        <span class="si">🔍</span>
        <input id="searchInput" type="text" placeholder="Search quests, people, departments…" />
      </div>
      <div class="spacer"></div>
      <div class="player" title="Your campus rank">
        <div class="meta">
          <div class="name">Ops Coordinator</div>
          <div class="lv" id="player-lv">Level 1 · 0 XP</div>
        </div>
        <div class="ring" id="player-ring"></div>
      </div>
      <button class="btn btn-primary" id="newQuestBtn"><span>＋</span> New Quest</button>
    </header>

    <main id="view"></main>
  </div>
</div>

<div id="toasts"></div>
<div id="modal-root"></div>
<canvas id="confetti"></canvas>

<script>
/* ============================================================
   CampusQuest — application logic (vanilla JS, no backend)
   ============================================================ */

/* ---------- meta config ---------- */
const CATEGORIES = {
  Library:        {icon:'📚', color:'#A855F7'},
  Examination:    {icon:'📝', color:'#FF2D95'},
  Sports:         {icon:'⚽', color:'#22D3EE'},
  Cultural:       {icon:'🎭', color:'#FBBF24'},
  Hostel:         {icon:'🏠', color:'#A3E635'},
  Placements:     {icon:'💼', color:'#60A5FA'},
  IT:             {icon:'💻', color:'#34D399'},
  Administration: {icon:'🏛️', color:'#F472B6'},
  Academics:      {icon:'🎓', color:'#C084FC'},
  Events:         {icon:'🎪', color:'#FB7185'},
};
const PRIORITIES = {Critical:100, High:70, Medium:40, Low:20};
const STATUS = {todo:'To Do', 'in-progress':'In Progress', done:'Done'};
const STATUS_COLOR = {todo:'#FF2D95', 'in-progress':'#22D3EE', done:'#A3E635'};

/* ---------- date helpers ---------- */
const DAY = 86400000;
const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const offsetDate = n => new Date(today().getTime() + n*DAY).toISOString().slice(0,10);
function dayDiff(iso){ const d = new Date(iso); d.setHours(0,0,0,0); return Math.round((d - today())/DAY); }
function dueLabel(iso){
  const n = dayDiff(iso);
  if(n < 0) return {text:`${Math.abs(n)}d overdue`, cls:'overdue', ic:'🔥'};
  if(n === 0) return {text:'Due today', cls:'today', ic:'⏰'};
  if(n === 1) return {text:'Due tomorrow', cls:'', ic:'📅'};
  return {text:`In ${n} days`, cls:'', ic:'📅'};
}
function initials(name){ return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function avatarColor(name){
  let h=0; for(const c of name) h = (h*31 + c.charCodeAt(0))%360;
  return `linear-gradient(135deg,hsl(${h} 80% 55%),hsl(${(h+50)%360} 85% 55%))`;
}

/* ---------- seed (dummy) data ---------- */
function seed(){
  const q = [
    ['Restock returned books on 2nd-floor reference shelf','Library','Medium','done',-2,'Aarav Mehta','Library Secretary'],
    ['Print & distribute end-sem hall tickets','Examination','Critical','in-progress',1,'Dr. Neha Kulkarni','Exam Cell Officer'],
    ['Set up sound check for cultural fest auditions','Cultural','High','todo',0,'Ishaan Verma','Cultural Head'],
    ['Mark inter-college football tryout attendance','Sports','Medium','todo',0,'Rohan Pillai','Sports Captain'],
    ['Resolve Wi-Fi outage in Block C hostel','IT','Critical','in-progress',0,'Karthik Rao','IT Support Lead'],
    ['Submit weekly mess feedback report','Hostel','Low','todo',2,'Sana Khan','Hostel Warden'],
    ['Schedule mock interviews with TechNova recruiters','Placements','High','todo',3,'Priya Nair','Placement Coordinator'],
    ['Update notice board with revised exam timetable','Administration','Medium','done',-1,'Vikram Joshi','Admin Assistant'],
    ['Grade Data Structures lab assignment batch B','Academics','High','in-progress',1,'Prof. Anita Desai','Faculty'],
    ['Reserve seminar hall for guest lecture on AI','Events','Medium','todo',4,'Meera Iyer','Events Lead'],
    ['Issue overdue book fine reminders','Library','Low','todo',1,'Aarav Mehta','Library Secretary'],
    ['Verify scholarship documents for new applicants','Administration','Critical','todo',-1,'Vikram Joshi','Admin Assistant'],
    ['Order new jerseys for basketball team','Sports','Low','done',-3,'Rohan Pillai','Sports Captain'],
    ['Configure projector in Lecture Hall 4','IT','Medium','done',-1,'Karthik Rao','IT Support Lead'],
    ['Coordinate volunteers for annual tech fest','Events','High','in-progress',5,'Meera Iyer','Events Lead'],
    ['Collect placement preference forms from final years','Placements','Medium','todo',2,'Priya Nair','Placement Coordinator'],
    ['Inspect hostel fire safety equipment','Hostel','Critical','todo',1,'Sana Khan','Hostel Warden'],
    ['Upload recorded Algorithms lectures to portal','Academics','Low','todo',3,'Prof. Anita Desai','Faculty'],
    ['Decorate stage for inter-department dance event','Cultural','Medium','todo',2,'Ishaan Verma','Cultural Head'],
    ['Backup exam answer-script scans to drive','Examination','High','todo',0,'Dr. Neha Kulkarni','Exam Cell Officer'],
  ];
  return q.map((r,i)=>({
    id:'q'+(i+1),
    title:r[0], category:r[1], priority:r[2], status:r[3],
    due:offsetDate(r[4]), assignee:r[5], role:r[6],
    xp:PRIORITIES[r[2]],
    desc:descFor(r[1])
  }));
}
function descFor(cat){
  const m={
    Library:'Keep the learning resource center running smoothly for every student.',
    Examination:'Time-sensitive exam logistics — accuracy is non-negotiable.',
    Sports:'Support athletics operations and team coordination.',
    Cultural:'Bring campus culture to life with a flawless production.',
    Hostel:'Ensure resident comfort, safety and a clean living space.',
    Placements:'Move students closer to their dream offers.',
    IT:'Keep campus tech infrastructure online and reliable.',
    Administration:'Handle the paperwork that keeps the institution compliant.',
    Academics:'Directly support teaching and learning outcomes.',
    Events:'Plan and execute memorable campus moments.',
  };
  return m[cat]||'A daily campus operations task.';
}

/* ---------- state + persistence ----------
   Stored as {v, quests}. We reseed whenever storage is missing, empty,
   corrupt, or from an older version — so the sample data always shows up. */
const SEED_VERSION = 2;
const store = {
  load(){
    try{
      const raw = localStorage.getItem('campusquest');
      if(!raw) return null;
      const data = JSON.parse(raw);
      const arr  = Array.isArray(data) ? data : data.quests;   // accept old array format too
      const ver  = Array.isArray(data) ? 0    : data.v;
      if(!Array.isArray(arr) || arr.length === 0) return null;  // empty -> reseed
      if(ver !== SEED_VERSION) return null;                     // outdated -> reseed
      return arr;
    }catch(e){ return null; }
  },
  save(q){ try{ localStorage.setItem('campusquest', JSON.stringify({v:SEED_VERSION, quests:q})); }catch(e){} },
  clear(){ try{ localStorage.removeItem('campusquest'); }catch(e){} }
};
let quests = store.load();
if(!quests || !quests.length){ quests = seed(); store.save(quests); }   // guarantee sample data
let state = { view:'dashboard', search:'', f_status:'all', f_priority:'all', f_category:'all', f_quick:null };

/* ---------- XP / level ---------- */
function totalXP(){ return quests.filter(q=>q.status==='done').reduce((s,q)=>s+q.xp,0); }
function levelInfo(xp){
  let lvl=1, need=300, acc=0;
  while(xp >= acc+need){ acc+=need; lvl++; need=200+(lvl-1)*120; }
  return {lvl, into:xp-acc, need, pct:Math.round(((xp-acc)/need)*100)};
}

/* ---------- stats ---------- */
function stats(){
  const done = quests.filter(q=>q.status==='done').length;
  const active = quests.filter(q=>q.status!=='done').length;
  const overdue = quests.filter(q=>q.status!=='done' && dayDiff(q.due)<0).length;
  const dueToday = quests.filter(q=>q.status!=='done' && dayDiff(q.due)===0).length;
  const pct = quests.length ? Math.round(done/quests.length*100) : 0;
  return {total:quests.length, done, active, overdue, dueToday, pct};
}

/* ---------- SVG ring ---------- */
function ring(size, stroke, pct, color, track='rgba(255,255,255,0.08)'){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      style="transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1);filter:drop-shadow(0 0 6px ${color})"/>
  </svg>`;
}

/* ============================================================
   Render
   ============================================================ */
const viewEl = document.getElementById('view');

function render(){
  // sidebar active + badges
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const s=stats();
  document.getElementById('nav-active').textContent=s.active;
  document.getElementById('nav-today').textContent=s.dueToday;

  // player chip
  const xp=totalXP(), li=levelInfo(xp);
  document.getElementById('player-lv').textContent=`Level ${li.lvl} · ${xp} XP`;
  document.getElementById('player-ring').innerHTML = ring(46,5,li.pct,'#A3E635') + `<div class="lvtxt">${li.lvl}</div>`;

  if(state.view==='dashboard') renderDashboard(s,xp,li);
  else if(state.view==='quests') renderQuests();
  else if(state.view==='board') renderBoard();
  else if(state.view==='leaderboard') renderLeaderboard();

  // mark active nav
  const active=[...document.querySelectorAll('.nav-item')].find(n=>n.dataset.view===state.view && (!n.dataset.filter || n.dataset.filter===state.f_quick));
  (active || document.querySelector(`.nav-item[data-view="${state.view}"]`))?.classList.add('active');
}

/* ---------- dashboard ---------- */
function renderDashboard(s,xp,li){
  const hour=new Date().getHours();
  const greet = hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  // category breakdown
  const catCounts={};
  quests.forEach(q=>catCounts[q.category]=(catCounts[q.category]||0)+1);
  const maxCat=Math.max(...Object.values(catCounts),1);
  const catRows=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`
    <div class="cat-row">
      <div class="nm">${CATEGORIES[c].icon} ${c}</div>
      <div class="track"><div class="fill" style="width:0;background:linear-gradient(90deg,${CATEGORIES[c].color},${CATEGORIES[c].color}99)" data-w="${n/maxCat*100}"></div></div>
      <div class="ct">${n}</div>
    </div>`).join('');

  const todayQuests = quests.filter(q=>q.status!=='done' && dayDiff(q.due)<=0)
    .sort((a,b)=>dayDiff(a.due)-dayDiff(b.due)).slice(0,6);
  const miniList = todayQuests.length ? todayQuests.map(q=>{
    const d=dueLabel(q.due);
    return `<div class="mini" data-open="${q.id}">
      <span class="dot" style="color:${CATEGORIES[q.category].color}"></span>
      <div class="tt"><div class="t">${esc(q.title)}</div><div class="s">${CATEGORIES[q.category].icon} ${q.category} · <span style="color:${d.cls==='overdue'?'var(--danger)':d.cls==='today'?'var(--amber)':'inherit'}">${d.text}</span></div></div>
      <div class="xp">+${q.xp}</div>
    </div>`;
  }).join('') : `<div class="empty" style="padding:30px"><div class="em">🎉</div><h4>All clear for today</h4><p>No quests due. Great work, coordinator.</p></div>`;

  viewEl.innerHTML = `
  <div class="view">
    <div class="hero">
      <div>
        <p class="greet">${greet}, Coordinator</p>
        <h3>You're Level ${li.lvl} on campus 🚀</h3>
        <p>${s.active} active quests across ${Object.keys(catCounts).length} departments. ${s.overdue?`<b style="color:#ff8fa3">${s.overdue} need attention now.</b>`:'Everything is on track.'} Earn ${li.need-li.into} XP more to level up.</p>
      </div>
      <div class="core">
        ${ring(160,12,s.pct,'#22D3EE','rgba(255,255,255,0.07)')}
        <div class="core-mid"><div class="pct" data-count="${s.pct}">0%</div><div class="lab">Completion</div></div>
      </div>
    </div>

    <div class="stat-grid">
      ${statCard('s-total','📋','Total Quests',s.total)}
      ${statCard('s-active','⚡','Active',s.active)}
      ${statCard('s-done','✅','Completed',s.done)}
      ${statCard('s-over','🔥','Overdue',s.overdue)}
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-head"><h4>Today's Priority Quests</h4><span class="link" data-go="quests">View all →</span></div>
        ${miniList}
      </div>
      <div class="card">
        <div class="card-head"><h4>Department Load</h4></div>
        ${catRows}
      </div>
    </div>
  </div>`;

  // animations
  requestAnimationFrame(()=>{
    document.querySelectorAll('.fill[data-w]').forEach(f=>f.style.width=f.dataset.w+'%');
    document.querySelectorAll('[data-count]').forEach(countUp);
  });
}
function statCard(cls,ico,lab,val){
  return `<div class="stat ${cls}"><div class="ico">${ico}</div>
    <div class="num" data-count="${val}">0</div><div class="lab">${lab}</div><div class="bar"></div></div>`;
}

/* ---------- quests ---------- */
function filteredQuests(){
  let list=[...quests];
  if(state.f_quick==='today') list=list.filter(q=>q.status!=='done'&&dayDiff(q.due)===0);
  if(state.f_quick==='overdue') list=list.filter(q=>q.status!=='done'&&dayDiff(q.due)<0);
  if(state.f_status!=='all') list=list.filter(q=>q.status===state.f_status);
  if(state.f_priority!=='all') list=list.filter(q=>q.priority===state.f_priority);
  if(state.f_category!=='all') list=list.filter(q=>q.category===state.f_category);
  if(state.search){
    const s=state.search.toLowerCase();
    list=list.filter(q=>(q.title+q.desc+q.assignee+q.category+q.role).toLowerCase().includes(s));
  }
  const order={'in-progress':0,todo:1,done:2};
  return list.sort((a,b)=> order[a.status]-order[b.status] || dayDiff(a.due)-dayDiff(b.due));
}
function renderQuests(){
  const list=filteredQuests();
  const quickName=state.f_quick==='today'?'Due Today':state.f_quick==='overdue'?'Overdue':'';
  viewEl.innerHTML=`
  <div class="view">
    <div class="page-head">
      <p class="eyebrow">Mission Log</p>
      <h2>${quickName||'All Quests'}</h2>
      <p>Track, assign and complete daily campus operations. Completing a quest grants XP to its owner.</p>
    </div>
    <div class="filters">
      ${chip('status','all','All')}${chip('status','todo','To Do')}${chip('status','in-progress','In Progress')}${chip('status','done','Done')}
      <select class="select" id="fcat">
        <option value="all">All departments</option>
        ${Object.keys(CATEGORIES).map(c=>`<option value="${c}" ${state.f_category===c?'selected':''}>${CATEGORIES[c].icon} ${c}</option>`).join('')}
      </select>
      <select class="select" id="fprio">
        <option value="all">Any priority</option>
        ${Object.keys(PRIORITIES).map(p=>`<option value="${p}" ${state.f_priority===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    ${list.length? `<div class="quest-grid">${list.map(questCard).join('')}</div>`
      : `<div class="empty"><div class="em">🛸</div><h4>No quests match</h4><p>Try clearing filters or create a new quest.</p></div>`}
  </div>`;
}
function chip(group,val,label){
  const cur=state['f_'+group];
  return `<button class="chip ${cur===val?'on':''}" data-chip="${group}" data-val="${val}">${label}</button>`;
}
function questCard(q){
  const cat=CATEGORIES[q.category], d=dueLabel(q.due);
  const doneCls=q.status==='done'?'done':'';
  return `<div class="quest ${doneCls}" style="--accent:${cat.color}" data-open="${q.id}">
    <span class="q-xp">+${q.xp} XP</span>
    <div class="q-top">
      <span class="q-cat">${cat.icon} ${q.category}</span>
      <span class="q-prio prio-${q.priority}">${q.priority}</span>
    </div>
    <h3 class="q-title">${esc(q.title)}</h3>
    <p class="q-desc">${esc(q.desc)}</p>
    <div class="q-foot">
      <div class="q-assignee"><span class="avatar" style="background:${avatarColor(q.assignee)}">${initials(q.assignee)}</span>${esc(q.assignee.split(' ')[0])}</div>
      <span class="q-due ${q.status==='done'?'':d.cls}">${q.status==='done'?'✅ Done':d.ic+' '+d.text}</span>
    </div>
    <div class="q-actions">
      ${q.status!=='done'
        ? `<button class="q-btn complete" data-complete="${q.id}">✓ Complete (+${q.xp})</button>`
        : `<button class="q-btn" data-reopen="${q.id}">↺ Reopen</button>`}
      <button class="q-btn del" data-del="${q.id}" title="Delete quest">🗑</button>
    </div>
  </div>`;
}

/* ---------- board ---------- */
function renderBoard(){
  const cols=['todo','in-progress','done'];
  viewEl.innerHTML=`
  <div class="view">
    <div class="page-head">
      <p class="eyebrow">Operations Board</p>
      <h2>Quest Board</h2>
      <p>Move quests across stages. Push one to <b style="color:var(--lime)">Done</b> to bank its XP.</p>
    </div>
    <div class="board">
      ${cols.map(col=>{
        const items=quests.filter(q=>q.status===col).sort((a,b)=>dayDiff(a.due)-dayDiff(b.due));
        return `<div class="col">
          <div class="col-head">
            <span class="cdot" style="color:${STATUS_COLOR[col]}"></span>
            <h4>${STATUS[col]}</h4><span class="cnt">${items.length}</span>
          </div>
          ${items.map(q=>boardCard(q,col)).join('') || `<div style="padding:18px;text-align:center;color:var(--faint);font-size:13px">Empty</div>`}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}
function boardCard(q,col){
  const cat=CATEGORIES[q.category], d=dueLabel(q.due);
  const prev={'in-progress':'todo',done:'in-progress'}[col];
  const next={todo:'in-progress','in-progress':'done'}[col];
  return `<div class="bcard" style="--accent:${cat.color}" data-open="${q.id}">
    <p class="bt">${esc(q.title)}</p>
    <div class="bm">${cat.icon} ${q.category} · <span style="color:${col==='done'?'var(--lime)':d.cls==='overdue'?'var(--danger)':d.cls==='today'?'var(--amber)':'inherit'}">${col==='done'?'+'+q.xp+' XP':d.text}</span></div>
    <div class="bmove">
      ${prev?`<button class="bmv" data-move="${q.id}" data-to="${prev}">◀ ${STATUS[prev]}</button>`:''}
      ${next?`<button class="bmv ${next==='done'?'fwd':''}" data-move="${q.id}" data-to="${next}">${STATUS[next]} ▶</button>`:''}
    </div>
  </div>`;
}

/* ---------- leaderboard ---------- */
function renderLeaderboard(){
  const map={};
  quests.forEach(q=>{
    if(!map[q.assignee]) map[q.assignee]={name:q.assignee,role:q.role,done:0,xp:0,total:0};
    map[q.assignee].total++;
    if(q.status==='done'){ map[q.assignee].done++; map[q.assignee].xp+=q.xp; }
  });
  const rows=Object.values(map).sort((a,b)=>b.xp-a.xp || b.done-a.done);
  viewEl.innerHTML=`
  <div class="view">
    <div class="page-head">
      <p class="eyebrow">Hall of Fame</p>
      <h2>Campus Leaderboard</h2>
      <p>Ranked by XP earned from completed quests. A little friendly competition keeps the campus running.</p>
    </div>
    <div class="lb">
      ${rows.map((r,i)=>{
        const li=levelInfo(r.xp);
        return `<div class="lb-row ${i<3?'top'+(i+1):''}">
          <div class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
          <span class="avatar lb-av" style="background:${avatarColor(r.name)}">${initials(r.name)}</span>
          <div class="lb-info"><div class="nm">${esc(r.name)}</div><div class="rl">${esc(r.role)} · Level ${li.lvl}</div></div>
          <div class="lb-stat xp"><div class="v">${r.xp}</div><div class="l">XP</div></div>
          <div class="lb-stat"><div class="v">${r.done}</div><div class="l">Done</div></div>
          <div class="lb-stat"><div class="v">${r.total}</div><div class="l">Total</div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ============================================================
   Actions
   ============================================================ */
function completeQuest(id){
  const q=quests.find(x=>x.id===id); if(!q||q.status==='done') return;
  q.status='done'; store.save(quests);
  burst(); toast('🏆','Quest complete!',`+${q.xp} XP`);
  render();
}
function moveQuest(id,to){
  const q=quests.find(x=>x.id===id); if(!q) return;
  const wasDone=q.status==='done'; q.status=to; store.save(quests);
  if(to==='done'&&!wasDone){ burst(); toast('🏆','Quest complete!',`+${q.xp} XP`); }
  render();
}
function reopenQuest(id){ const q=quests.find(x=>x.id===id); if(q){ q.status='todo'; store.save(quests); render(); } }
function deleteQuest(id){
  quests=quests.filter(x=>x.id!==id); store.save(quests);
  toast('🗑','Quest removed',''); render();
}

/* ---------- new quest modal ---------- */
function openQuestModal(){
  const root=document.getElementById('modal-root');
  root.innerHTML=`
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>Create a Quest</h3>
      <p class="sub">Add a daily task to the campus board.</p>
      <div class="field"><label>Quest title</label><input id="m-title" placeholder="e.g. Set up registration desk for orientation" /></div>
      <div class="field"><label>Description</label><textarea id="m-desc" placeholder="What needs to happen?"></textarea></div>
      <div class="row2">
        <div class="field"><label>Department</label><select id="m-cat">${Object.keys(CATEGORIES).map(c=>`<option value="${c}">${CATEGORIES[c].icon} ${c}</option>`).join('')}</select></div>
        <div class="field"><label>Priority</label><select id="m-prio">${Object.keys(PRIORITIES).map(p=>`<option value="${p}" ${p==='Medium'?'selected':''}>${p} · ${PRIORITIES[p]} XP</option>`).join('')}</select></div>
      </div>
      <div class="row2">
        <div class="field"><label>Assignee</label><input id="m-assignee" placeholder="Full name" value="Ops Coordinator" /></div>
        <div class="field"><label>Due date</label><input id="m-due" type="date" value="${offsetDate(0)}" /></div>
      </div>
      <div class="field"><label>Role / title</label><input id="m-role" placeholder="e.g. Events Lead" value="Coordinator" /></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">Create quest</button>
      </div>
    </div>
  </div>`;
  const close=()=>root.innerHTML='';
  document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') close(); });
  document.getElementById('m-cancel').onclick=close;
  document.getElementById('m-title').focus();
  document.getElementById('m-save').onclick=()=>{
    const title=document.getElementById('m-title').value.trim();
    if(!title){ document.getElementById('m-title').style.borderColor='var(--danger)'; return; }
    const prio=document.getElementById('m-prio').value;
    quests.unshift({
      id:'q'+Date.now(),
      title,
      desc:document.getElementById('m-desc').value.trim()||descFor(document.getElementById('m-cat').value),
      category:document.getElementById('m-cat').value,
      priority:prio, xp:PRIORITIES[prio],
      status:'todo',
      assignee:document.getElementById('m-assignee').value.trim()||'Ops Coordinator',
      role:document.getElementById('m-role').value.trim()||'Coordinator',
      due:document.getElementById('m-due').value||offsetDate(0),
    });
    store.save(quests); close(); toast('✨','Quest created','');
    state.view='quests'; state.f_quick=null; render();
  };
}

/* ---------- quest detail modal ---------- */
function openDetail(id){
  const q=quests.find(x=>x.id===id); if(!q) return;
  const cat=CATEGORIES[q.category], d=dueLabel(q.due);
  const root=document.getElementById('modal-root');
  root.innerHTML=`
  <div class="overlay" id="overlay">
    <div class="modal" style="--accent:${cat.color}">
      <div class="q-top" style="margin-bottom:14px">
        <span class="q-cat">${cat.icon} ${q.category}</span>
        <span class="q-prio prio-${q.priority}">${q.priority}</span>
        <span class="q-xp" style="position:static;margin-left:8px">+${q.xp} XP</span>
      </div>
      <h3 style="font-size:21px;line-height:1.3">${esc(q.title)}</h3>
      <p class="sub" style="font-size:14.5px;color:var(--muted);margin:10px 0 18px">${esc(q.desc)}</p>
      <div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:rgba(11,10,31,0.6);border:1px solid var(--stroke);margin-bottom:18px">
        <span class="avatar" style="width:40px;height:40px;font-size:14px;background:${avatarColor(q.assignee)}">${initials(q.assignee)}</span>
        <div><div style="font-weight:700">${esc(q.assignee)}</div><div style="font-size:12.5px;color:var(--muted)">${esc(q.role)}</div></div>
        <div style="margin-left:auto;text-align:right"><div style="font-weight:700;color:${q.status==='done'?'var(--lime)':d.cls==='overdue'?'var(--danger)':d.cls==='today'?'var(--amber)':'var(--text)'}">${q.status==='done'?'✅ Completed':d.ic+' '+d.text}</div><div style="font-size:12px;color:var(--muted)">${STATUS[q.status]}</div></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="m-close">Close</button>
        ${q.status!=='done'
          ?`<button class="btn btn-primary" id="m-done">✓ Complete (+${q.xp} XP)</button>`
          :`<button class="btn btn-ghost" id="m-reopen">↺ Reopen quest</button>`}
      </div>
    </div>
  </div>`;
  const close=()=>root.innerHTML='';
  document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') close(); });
  document.getElementById('m-close').onclick=close;
  if(document.getElementById('m-done')) document.getElementById('m-done').onclick=()=>{ close(); completeQuest(id); };
  if(document.getElementById('m-reopen')) document.getElementById('m-reopen').onclick=()=>{ close(); reopenQuest(id); };
}

/* ============================================================
   Toast + confetti
   ============================================================ */
function toast(ic,title,xp){
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<span class="ti">${ic}</span><span>${title}</span>${xp?`<span class="xpb">${xp}</span>`:''}`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{ t.style.transition='.3s'; t.style.opacity='0'; t.style.transform='translateX(40px)'; setTimeout(()=>t.remove(),300); },2600);
}
const confCanvas=document.getElementById('confetti');
const cctx=confCanvas.getContext('2d');
let confetti=[];
function sizeConf(){ confCanvas.width=innerWidth; confCanvas.height=innerHeight; }
sizeConf(); addEventListener('resize',sizeConf);
function burst(){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const colors=['#A855F7','#FF2D95','#22D3EE','#A3E635','#FBBF24'];
  for(let i=0;i<90;i++){
    confetti.push({
      x:innerWidth/2,y:innerHeight/2,
      vx:(Math.random()-0.5)*16, vy:(Math.random()-0.5)*16-4,
      g:0.32, size:Math.random()*7+4, life:1,
      color:colors[i%colors.length], rot:Math.random()*6, vr:(Math.random()-0.5)*0.4
    });
  }
  if(!confRunning) runConf();
}
let confRunning=false;
function runConf(){
  confRunning=true;
  (function loop(){
    cctx.clearRect(0,0,confCanvas.width,confCanvas.height);
    confetti.forEach(p=>{
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=0.012;
      cctx.save(); cctx.globalAlpha=Math.max(p.life,0); cctx.translate(p.x,p.y); cctx.rotate(p.rot);
      cctx.fillStyle=p.color; cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6); cctx.restore();
    });
    confetti=confetti.filter(p=>p.life>0 && p.y<confCanvas.height+40);
    if(confetti.length){ requestAnimationFrame(loop); } else { cctx.clearRect(0,0,confCanvas.width,confCanvas.height); confRunning=false; }
  })();
}

/* ---------- count up ---------- */
function countUp(el){
  const target=parseFloat(el.dataset.count); const suffix=el.textContent.includes('%')?'%':'';
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){ el.textContent=target+suffix; return; }
  let cur=0; const steps=36, inc=target/steps;
  const t=setInterval(()=>{ cur+=inc; if(cur>=target){ cur=target; clearInterval(t);} el.textContent=Math.round(cur)+suffix; },18);
}

/* ============================================================
   Background particles
   ============================================================ */
const pc=document.getElementById('particles'); const pctx=pc.getContext('2d');
let parts=[];
function sizeP(){ pc.width=innerWidth; pc.height=innerHeight; init(); }
function init(){
  parts=[]; const n=Math.min(70,Math.floor(innerWidth/22));
  const cols=['168,85,247','34,211,238','255,45,149','163,230,53'];
  for(let i=0;i<n;i++) parts.push({
    x:Math.random()*pc.width,y:Math.random()*pc.height,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*2+0.6, c:cols[i%cols.length], a:Math.random()*0.5+0.2
  });
}
function drawP(){
  pctx.clearRect(0,0,pc.width,pc.height);
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>pc.width)p.vx*=-1; if(p.y<0||p.y>pc.height)p.vy*=-1;
    pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,7); pctx.fillStyle=`rgba(${p.c},${p.a})`; pctx.fill();
    for(let j=i+1;j<parts.length;j++){
      const q=parts[j], dx=p.x-q.x, dy=p.y-q.y, dist=Math.hypot(dx,dy);
      if(dist<120){ pctx.beginPath(); pctx.moveTo(p.x,p.y); pctx.lineTo(q.x,q.y);
        pctx.strokeStyle=`rgba(${p.c},${0.10*(1-dist/120)})`; pctx.lineWidth=1; pctx.stroke(); }
    }
  }
  requestAnimationFrame(drawP);
}
try{ if(!matchMedia('(prefers-reduced-motion:reduce)').matches){ sizeP(); addEventListener('resize',sizeP); drawP(); } }catch(e){ console.warn('Particles disabled:',e); }

/* ============================================================
   Events
   ============================================================ */
const sidebar=document.getElementById('sidebar'), scrim=document.getElementById('scrim');
function closeMenu(){ sidebar.classList.remove('open'); scrim.classList.remove('show'); }
document.getElementById('menuBtn').onclick=()=>{ sidebar.classList.add('open'); scrim.classList.add('show'); };
scrim.onclick=closeMenu;

document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>{
  state.view=n.dataset.view; state.f_quick=n.dataset.filter||null;
  if(state.f_quick){ state.f_status='all'; }
  closeMenu(); render();
}));

document.getElementById('newQuestBtn').onclick=openQuestModal;

document.getElementById('resetBtn').onclick=()=>{
  store.clear(); quests=seed(); store.save(quests);
  state={view:'dashboard',search:'',f_status:'all',f_priority:'all',f_category:'all',f_quick:null};
  document.getElementById('searchInput').value='';
  closeMenu(); toast('↺','Sample data restored','');
  render();
};

document.getElementById('searchInput').addEventListener('input',e=>{
  state.search=e.target.value;
  if(state.view!=='quests'){ state.view='quests'; state.f_quick=null; }
  render();
});

// delegated clicks across the view
viewEl.addEventListener('click',e=>{
  const t=e.target;
  const closestData=(attr)=>t.closest(`[${attr}]`);
  if(t.closest('[data-complete]')){ e.stopPropagation(); completeQuest(t.closest('[data-complete]').dataset.complete); return; }
  if(t.closest('[data-reopen]')){ e.stopPropagation(); reopenQuest(t.closest('[data-reopen]').dataset.reopen); return; }
  if(t.closest('[data-del]')){ e.stopPropagation(); deleteQuest(t.closest('[data-del]').dataset.del); return; }
  if(t.closest('[data-move]')){ e.stopPropagation(); const b=t.closest('[data-move]'); moveQuest(b.dataset.move,b.dataset.to); return; }
  if(t.closest('[data-chip]')){ const c=t.closest('[data-chip]'); state['f_'+c.dataset.chip]=c.dataset.val; state.f_quick=null; render(); return; }
  if(t.closest('[data-go]')){ state.view=t.closest('[data-go]').dataset.go; state.f_quick=null; render(); return; }
  const opener=closestData('data-open');
  if(opener){ openDetail(opener.dataset.open); }
});
viewEl.addEventListener('change',e=>{
  if(e.target.id==='fcat'){ state.f_category=e.target.value; render(); }
  if(e.target.id==='fprio'){ state.f_priority=e.target.value; render(); }
});
addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('modal-root').innerHTML=''; });

/* ---------- clock ---------- */
function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,30000);

/* ---------- util ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- boot ---------- */
try{
  render();
}catch(err){
  console.error('CampusQuest boot error:', err);
  viewEl.innerHTML = '<div class="view"><div class="empty">'
    + '<div class="em">⚠️</div>'
    + '<h4>The app hit an error while loading</h4>'
    + '<p>' + esc(String((err && err.message) || err)) + '</p>'
    + '<button class="btn btn-primary" style="margin-top:14px" onclick="try{localStorage.removeItem(\'campusquest\')}catch(e){};location.reload()">Reset & reload</button>'
    + '</div></div>';
}
</script>
